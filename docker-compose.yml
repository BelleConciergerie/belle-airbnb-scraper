services:
  scraper:
    build: .
    container_name: belle-airbnb-scraper
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Host 8201 → container 8000 (Booking sur 8200, Airbnb sur 8201).
      - "8201:8000"
    deploy:
      resources:
        limits:
          # Fan-out : 4 workers uvicorn + cache 5000 entries (details ~500KB +
          # calendar ~600KB) ~= 5-6 GB worst case, 2GB suffisant en utilisation
          # nominale avec LRU eviction.
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
