services:
  scraper:
    build: .
    container_name: belle-airbnb-scraper
    restart: unless-stopped
    command: ["uvicorn", "airbnb_scraper.server:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "24"]
    env_file:
      - .env
    ports:
      # Host 8201 → container 8000 (Booking sur 8200, Airbnb sur 8201).
      - "8201:8000"
    deploy:
      resources:
        limits:
          # Fan-out v7 365j : 12 workers uvicorn (process Python independants)
          # × cache 5000 entries ~100KB = ~6 GB worst case. 8G donne marge.
          # 4 CPUs pour que les 12 workers asyncio puissent reellement servir
          # les calls concurrents (chacun fait async + threadpool anyio).
          memory: 8G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
