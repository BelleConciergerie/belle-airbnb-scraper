services:
  scraper:
    build: .
    container_name: belle-airbnb-scraper
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Host 8201 → container 8000 (Booking sur 8200, Airbnb sur 8201).
      - "8201:8000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
